<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>股票实时分析</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            color: #333;
            line-height: 1.6;
        }
        
        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
        }
        
        header {
            background: rgba(255, 255, 255, 0.95);
            padding: 30px;
            border-radius: 16px;
            margin-bottom: 30px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            backdrop-filter: blur(10px);
        }
        
        h1 {
            font-size: 36px;
            margin-bottom: 10px;
            font-weight: 700;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        header p {
            font-size: 16px;
            color: #666;
            margin-top: 10px;
        }
        
        .search-section {
            background: rgba(255, 255, 255, 0.95);
            padding: 30px;
            border-radius: 16px;
            margin-bottom: 30px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            backdrop-filter: blur(10px);
        }
        
        .search-box {
            display: flex;
            gap: 15px;
            align-items: center;
            flex-wrap: wrap;
        }
        
        .input-group {
            flex: 1;
            min-width: 300px;
            position: relative;
        }
        
        input[type="text"] {
            width: 100%;
            padding: 15px 20px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 16px;
            transition: all 0.3s ease;
            background: #f9f9f9;
        }
        
        input[type="text"]:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 4px rgba(102, 126, 234, 0.1);
            background: white;
        }
        
        button {
            padding: 15px 30px;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
        }
        
        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.15);
        }
        
        button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }
        
        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        
        .btn-primary:hover:not(:disabled) {
            background: linear-gradient(135deg, #5568d3 0%, #6a4190 100%);
        }
        
        .btn-secondary {
            background: #f0f0f0;
            color: #333;
        }
        
        .btn-secondary:hover:not(:disabled) {
            background: #e0e0e0;
        }
        
        .loading {
            display: inline-block;
            width: 24px;
            height: 24px;
            border: 3px solid #f3f3f3;
            border-top: 3px solid #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-left: 10px;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        .hidden {
            display: none !important;
        }
        
        .main-content {
            display: grid;
            grid-template-columns: 1fr 350px;
            gap: 30px;
        }
        
        .stock-detail {
            background: rgba(255, 255, 255, 0.95);
            padding: 30px;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            backdrop-filter: blur(10px);
        }
        
        .stock-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 2px solid #f0f0f0;
        }
        
        .stock-title {
            display: flex;
            align-items: center;
            gap: 15px;
        }
        
        .stock-code {
            font-size: 28px;
            font-weight: 700;
            color: #2c3e50;
        }
        
        .stock-name {
            font-size: 24px;
            font-weight: 600;
            color: #666;
        }
        
        .price-display {
            text-align: right;
        }
        
        .current-price {
            font-size: 48px;
            font-weight: 700;
            color: #e74c3c;
            line-height: 1;
        }
        
        .price-change {
            font-size: 20px;
            margin-top: 8px;
            font-weight: 600;
        }
        
        .price-up {
            color: #e74c3c;
        }
        
        .price-down {
            color: #27ae60;
        }
        
        .price-flat {
            color: #7f8c8d;
        }
        
        .price-cards {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            margin-bottom: 30px;
        }
        
        .price-card {
            background: linear-gradient(135deg, #f8f9fa 0%, #e9ecef 100%);
            padding: 20px;
            border-radius: 12px;
            text-align: center;
            transition: all 0.3s ease;
            border: 2px solid transparent;
        }
        
        .price-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.1);
            border-color: #667eea;
        }
        
        .price-card-label {
            font-size: 14px;
            color: #666;
            margin-bottom: 10px;
            font-weight: 500;
        }
        
        .price-card-value {
            font-size: 28px;
            font-weight: 700;
        }
        
        .buy-price {
            color: #e74c3c;
        }
        
        .take-profit-price {
            color: #27ae60;
        }
        
        .stop-loss-price {
            color: #f39c12;
        }
        
        .analysis-section {
            margin-top: 30px;
        }
        
        .section-title {
            font-size: 20px;
            font-weight: 700;
            color: #2c3e50;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 2px solid #667eea;
            display: inline-block;
        }
        
        .analysis-result {
            background: linear-gradient(135deg, #f8f9fa 0%, #e9ecef 100%);
            padding: 25px;
            border-radius: 12px;
            margin-bottom: 20px;
        }
        
        .analysis-item {
            margin-bottom: 15px;
            padding: 15px;
            background: white;
            border-radius: 8px;
            border-left: 4px solid #667eea;
        }
        
        .analysis-item:last-child {
            margin-bottom: 0;
        }
        
        .analysis-label {
            font-size: 14px;
            color: #666;
            margin-bottom: 5px;
            font-weight: 500;
        }
        
        .analysis-value {
            font-size: 18px;
            font-weight: 600;
            color: #2c3e50;
        }
        
        .indicators-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 15px;
            margin-top: 20px;
        }
        
        .indicator-item {
            padding: 15px;
            background: white;
            border-radius: 8px;
            text-align: center;
            transition: all 0.3s ease;
            border: 2px solid #f0f0f0;
        }
        
        .indicator-item:hover {
            transform: translateY(-3px);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
        }
        
        .indicator-item.active {
            border-color: #27ae60;
            background: linear-gradient(135deg, #e8f5e9 0%, #c8e6c9 100%);
        }
        
        .indicator-name {
            font-size: 12px;
            color: #666;
            margin-bottom: 5px;
            font-weight: 500;
        }
        
        .indicator-value {
            font-size: 16px;
            font-weight: 700;
            color: #2c3e50;
        }
        
        .indicator-item.active .indicator-value {
            color: #27ae60;
        }
        
        .sidebar {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }
        
        .sidebar-card {
            background: rgba(255, 255, 255, 0.95);
            padding: 25px;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            backdrop-filter: blur(10px);
        }
        
        .sidebar-title {
            font-size: 18px;
            font-weight: 700;
            color: #2c3e50;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 2px solid #667eea;
        }
        
        .history-list {
            max-height: 400px;
            overflow-y: auto;
        }
        
        .history-item {
            padding: 12px;
            background: #f8f9fa;
            border-radius: 8px;
            margin-bottom: 10px;
            cursor: pointer;
            transition: all 0.3s ease;
            border: 2px solid transparent;
        }
        
        .history-item:hover {
            background: #e9ecef;
            border-color: #667eea;
            transform: translateX(5px);
        }
        
        .history-code {
            font-size: 14px;
            font-weight: 600;
            color: #2c3e50;
        }
        
        .history-time {
            font-size: 12px;
            color: #999;
            margin-top: 5px;
        }
        
        .status-message {
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 14px;
            font-weight: 500;
        }
        
        .status-info {
            background: #e3f2fd;
            color: #1976d2;
            border-left: 4px solid #2196f3;
        }
        
        .status-success {
            background: #e8f5e9;
            color: #2e7d32;
            border-left: 4px solid #4caf50;
        }
        
        .status-warning {
            background: #fff3e0;
            color: #ef6c00;
            border-left: 4px solid #ff9800;
        }
        
        .status-danger {
            background: #ffebee;
            color: #c62828;
            border-left: 4px solid #f44336;
        }
        
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #999;
        }
        
        .empty-state-icon {
            font-size: 64px;
            margin-bottom: 20px;
        }
        
        .empty-state-text {
            font-size: 18px;
            margin-bottom: 10px;
        }
        
        .empty-state-subtext {
            font-size: 14px;
            color: #bbb;
        }
        
        .refresh-indicator {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 14px;
            color: #666;
            margin-top: 15px;
        }
        
        .refresh-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #27ae60;
            animation: pulse 2s infinite;
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        
        .risk-warning {
            background: linear-gradient(135deg, #fff3e0 0%, #ffe0b2 100%);
            padding: 20px;
            border-radius: 12px;
            margin-top: 20px;
            border-left: 4px solid #ff9800;
        }
        
        .risk-warning-title {
            font-size: 16px;
            font-weight: 700;
            color: #ef6c00;
            margin-bottom: 10px;
        }
        
        .risk-warning-text {
            font-size: 14px;
            color: #e65100;
            line-height: 1.6;
        }
        
        @media (max-width: 1024px) {
            .main-content {
                grid-template-columns: 1fr;
            }
            
            .sidebar {
                flex-direction: row;
                flex-wrap: wrap;
            }
            
            .sidebar-card {
                flex: 1;
                min-width: 300px;
            }
        }
        
        @media (max-width: 768px) {
            .search-box {
                flex-direction: column;
            }
            
            .input-group {
                width: 100%;
            }
            
            button {
                width: 100%;
            }
            
            .price-cards {
                grid-template-columns: 1fr;
            }
            
            .indicators-grid {
                grid-template-columns: repeat(2, 1fr);
            }
            
            .stock-header {
                flex-direction: column;
                text-align: center;
            }
            
            .price-display {
                text-align: center;
                margin-top: 20px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>股票实时分析</h1>
            <p>智能分析 · 实时数据 · 投资决策</p>
        </header>
        
        <div class="search-section">
            <div class="search-box">
                <div class="input-group">
                    <input type="text" id="stock-code" placeholder="请输入股票代码（如：600000、000001）" maxlength="6">
                </div>
                <button id="analyze-btn" class="btn-primary">
                    <span id="analyze-btn-text">立即分析</span>
                    <span id="analyze-loading" class="loading hidden"></span>
                </button>
                <button id="refresh-btn" class="btn-secondary">
                    <span>刷新数据</span>
                </button>
            </div>
            <div id="status-message" class="status-message status-info hidden">
                请输入股票代码开始分析
            </div>
        </div>
        
        <div class="main-content">
            <div class="stock-detail">
                <div id="empty-state" class="empty-state">
                    <div class="empty-state-icon">📊</div>
                    <div class="empty-state-text">暂无数据</div>
                    <div class="empty-state-subtext">请输入股票代码进行实时分析</div>
                </div>
                
                <div id="stock-content" class="hidden">
                    <div class="stock-header">
                        <div class="stock-title">
                            <div class="stock-code" id="display-code">--</div>
                            <div class="stock-name" id="display-name">--</div>
                        </div>
                        <div class="price-display">
                            <div class="current-price" id="display-price">--</div>
                            <div class="price-change" id="display-change">--</div>
                        </div>
                    </div>
                    
                    <div class="price-cards">
                        <div class="price-card">
                            <div class="price-card-label">建议买入价</div>
                            <div class="price-card-value buy-price" id="buy-price">--</div>
                        </div>
                        <div class="price-card">
                            <div class="price-card-label">止盈目标价</div>
                            <div class="price-card-value take-profit-price" id="take-profit-price">--</div>
                        </div>
                        <div class="price-card">
                            <div class="price-card-label">止损价格</div>
                            <div class="price-card-value stop-loss-price" id="stop-loss-price">--</div>
                        </div>
                    </div>
                    
                    <div class="analysis-section">
                        <h3 class="section-title">智能分析结果</h3>
                        <div class="analysis-result">
                            <div class="analysis-item">
                                <div class="analysis-label">短期走势</div>
                                <div class="analysis-value" id="short-term">--</div>
                            </div>
                            <div class="analysis-item">
                                <div class="analysis-label">中期走势</div>
                                <div class="analysis-value" id="medium-term">--</div>
                            </div>
                            <div class="analysis-item">
                                <div class="analysis-label">投资建议</div>
                                <div class="analysis-value" id="suggestion">--</div>
                            </div>
                        </div>
                        
                        <div class="risk-warning">
                            <div class="risk-warning-title">⚠️ 风险提示</div>
                            <div class="risk-warning-text" id="risk-warning">--</div>
                        </div>
                    </div>
                    
                    <div class="analysis-section">
                        <h3 class="section-title">技术指标</h3>
                        <div class="indicators-grid" id="indicators-grid">
                            <div class="indicator-item" data-indicator="macd_bullish">
                                <div class="indicator-name">MACD金叉</div>
                                <div class="indicator-value">--</div>
                            </div>
                            <div class="indicator-item" data-indicator="wr_bullish">
                                <div class="indicator-name">WR超卖</div>
                                <div class="indicator-value">--</div>
                            </div>
                            <div class="indicator-item" data-indicator="ma_bullish">
                                <div class="indicator-name">均线多头</div>
                                <div class="indicator-value">--</div>
                            </div>
                            <div class="indicator-item" data-indicator="volume_bullish">
                                <div class="indicator-name">放量上涨</div>
                                <div class="indicator-value">--</div>
                            </div>
                            <div class="indicator-item" data-indicator="breakout_bullish">
                                <div class="indicator-name">突破信号</div>
                                <div class="indicator-value">--</div>
                            </div>
                            <div class="indicator-item" data-indicator="kdj_bullish">
                                <div class="indicator-name">KDJ金叉</div>
                                <div class="indicator-value">--</div>
                            </div>
                            <div class="indicator-item" data-indicator="rsi_bullish">
                                <div class="indicator-name">RSI适中</div>
                                <div class="indicator-value">--</div>
                            </div>
                            <div class="indicator-item" data-indicator="trend_up">
                                <div class="indicator-name">上升趋势</div>
                                <div class="indicator-value">--</div>
                            </div>
                        </div>
                    </div>
                    
                    <div class="refresh-indicator">
                        <div class="refresh-dot"></div>
                        <span>数据实时更新中</span>
                        <span id="last-update-time">--</span>
                    </div>
                </div>
            </div>
            
            <div class="sidebar">
                <div class="sidebar-card">
                    <h3 class="sidebar-title">历史查询</h3>
                    <div class="history-list" id="history-list">
                        <div style="text-align: center; color: #999; padding: 20px;">
                            暂无历史记录
                        </div>
                    </div>
                </div>
                
                <div class="sidebar-card">
                    <h3 class="sidebar-title">快捷操作</h3>
                    <div style="display: flex; flex-direction: column; gap: 10px;">
                        <button class="btn-secondary" onclick="quickAnalyze('600000')">浦发银行</button>
                        <button class="btn-secondary" onclick="quickAnalyze('000001')">平安银行</button>
                        <button class="btn-secondary" onclick="quickAnalyze('000002')">万科A</button>
                        <button class="btn-secondary" onclick="quickAnalyze('600036')">招商银行</button>
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    <script>
        let currentStockCode = null;
        let refreshInterval = null;
        let autoRefreshEnabled = true;
        
        document.addEventListener('DOMContentLoaded', function() {
            setupEventListeners();
            loadQueryHistory();
        });
        
        function setupEventListeners() {
            document.getElementById('analyze-btn').addEventListener('click', analyzeStock);
            document.getElementById('refresh-btn').addEventListener('click', refreshStockData);
            document.getElementById('stock-code').addEventListener('keypress', function(e) {
                if (e.key === 'Enter') {
                    analyzeStock();
                }
            });
        }
        
        function analyzeStock() {
            const stockCode = document.getElementById('stock-code').value.trim();
            
            if (!stockCode) {
                showStatus('请输入股票代码', 'warning');
                return;
            }
            
            if (!/^\d{5,6}$/.test(stockCode)) {
                showStatus('股票代码格式不正确，应为5-6位数字', 'danger');
                return;
            }
            
            setLoading(true);
            showStatus('正在分析股票数据...', 'info');
            
            fetch('/api/analyze_stock', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({ code: stockCode })
            })
            .then(response => response.json())
            .then(data => {
                if (data.status === 'analyzing') {
                    pollAnalysisResult(stockCode);
                } else if (data.error) {
                    showStatus(data.error, 'danger');
                    setLoading(false);
                }
            })
            .catch(error => {
                console.error('分析失败:', error);
                showStatus('分析失败，请稍后重试', 'danger');
                setLoading(false);
            });
        }
        
        function pollAnalysisResult(stockCode) {
            let pollCount = 0;
            const maxPolls = 30;
            
            const pollInterval = setInterval(() => {
                pollCount++;
                
                fetch('/api/status')
                    .then(response => response.json())
                    .then(data => {
                        const analyzeStatus = data.analyze_stock;
                        
                        if (analyzeStatus.status === 'completed' && analyzeStatus.result) {
                            clearInterval(pollInterval);
                            displayStockAnalysis(analyzeStatus.result);
                            setLoading(false);
                            showStatus('分析完成', 'success');
                            loadQueryHistory();
                            
                            if (autoRefreshEnabled) {
                                startAutoRefresh(stockCode);
                            }
                        } else if (analyzeStatus.status === 'error') {
                            clearInterval(pollInterval);
                            showStatus(analyzeStatus.error || '分析失败', 'danger');
                            setLoading(false);
                        } else if (pollCount >= maxPolls) {
                            clearInterval(pollInterval);
                            showStatus('分析超时，请重试', 'danger');
                            setLoading(false);
                        }
                    })
                    .catch(error => {
                        console.error('获取分析状态失败:', error);
                    });
            }, 1000);
        }
        
        function displayStockAnalysis(result) {
            currentStockCode = result.code;
            
            document.getElementById('empty-state').classList.add('hidden');
            document.getElementById('stock-content').classList.remove('hidden');
            
            document.getElementById('display-code').textContent = result.code;
            document.getElementById('display-name').textContent = result.name;
            
            const priceElement = document.getElementById('display-price');
            const changeElement = document.getElementById('display-change');
            
            priceElement.textContent = result.price.toFixed(2);
            
            if (result.change > 0) {
                changeElement.textContent = '+' + result.change.toFixed(2) + '%';
                changeElement.className = 'price-change price-up';
                priceElement.style.color = '#e74c3c';
            } else if (result.change < 0) {
                changeElement.textContent = result.change.toFixed(2) + '%';
                changeElement.className = 'price-change price-down';
                priceElement.style.color = '#27ae60';
            } else {
                changeElement.textContent = '0.00%';
                changeElement.className = 'price-change price-flat';
                priceElement.style.color = '#7f8c8d';
            }
            
            document.getElementById('buy-price').textContent = result.buy_price.toFixed(2);
            document.getElementById('take-profit-price').textContent = result.take_profit_price.toFixed(2);
            document.getElementById('stop-loss-price').textContent = result.stop_loss_price.toFixed(2);
            
            document.getElementById('short-term').textContent = result.short_term || '--';
            document.getElementById('medium-term').textContent = result.medium_term || '--';
            document.getElementById('suggestion').textContent = result.suggestion || '--';
            document.getElementById('risk-warning').textContent = result.risk || '--';
            
            displayIndicators(result.indicators);
            updateLastUpdateTime();
        }
        
        function displayIndicators(indicators) {
            const indicatorNames = {
                'macd_bullish': 'MACD金叉',
                'wr_bullish': 'WR超卖',
                'ma_bullish': '均线多头',
                'volume_bullish': '放量上涨',
                'breakout_bullish': '突破信号',
                'kdj_bullish': 'KDJ金叉',
                'rsi_bullish': 'RSI适中',
                'trend_up': '上升趋势'
            };
            
            Object.keys(indicators).forEach(key => {
                const indicatorItem = document.querySelector(`[data-indicator="${key}"]`);
                if (indicatorItem) {
                    const valueElement = indicatorItem.querySelector('.indicator-value');
                    if (indicators[key]) {
                        indicatorItem.classList.add('active');
                        valueElement.textContent = '是';
                    } else {
                        indicatorItem.classList.remove('active');
                        valueElement.textContent = '否';
                    }
                }
            });
        }
        
        function refreshStockData() {
            if (!currentStockCode) {
                showStatus('请先分析一只股票', 'warning');
                return;
            }
            
            showStatus('正在刷新数据...', 'info');
            
            fetch('/api/refresh_stock', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({ code: currentStockCode })
            })
            .then(response => response.json())
            .then(data => {
                if (data.status === 'success' && data.result) {
                    updatePriceDisplay(data.result);
                    showStatus('数据刷新成功', 'success');
                } else if (data.error) {
                    showStatus(data.error, 'danger');
                }
            })
            .catch(error => {
                console.error('刷新失败:', error);
                showStatus('刷新失败，请稍后重试', 'danger');
            });
        }
        
        function updatePriceDisplay(result) {
            const priceElement = document.getElementById('display-price');
            const changeElement = document.getElementById('display-change');
            
            priceElement.textContent = result.price.toFixed(2);
            
            if (result.change > 0) {
                changeElement.textContent = '+' + result.change.toFixed(2) + '%';
                changeElement.className = 'price-change price-up';
                priceElement.style.color = '#e74c3c';
            } else if (result.change < 0) {
                changeElement.textContent = result.change.toFixed(2) + '%';
                changeElement.className = 'price-change price-down';
                priceElement.style.color = '#27ae60';
            } else {
                changeElement.textContent = '0.00%';
                changeElement.className = 'price-change price-flat';
                priceElement.style.color = '#7f8c8d';
            }
            
            const oldPrice = parseFloat(priceElement.textContent);
            const priceChanged = oldPrice !== result.price;
            
            if (priceChanged) {
                priceElement.style.transform = 'scale(1.1)';
                setTimeout(() => {
                    priceElement.style.transform = 'scale(1)';
                }, 300);
            }
            
            document.getElementById('buy-price').textContent = result.buy_price.toFixed(2);
            document.getElementById('take-profit-price').textContent = result.take_profit_price.toFixed(2);
            document.getElementById('stop-loss-price').textContent = result.stop_loss_price.toFixed(2);
            
            updateLastUpdateTime();
        }
        
        function startAutoRefresh(stockCode) {
            if (refreshInterval) {
                clearInterval(refreshInterval);
            }
            
            refreshInterval = setInterval(() => {
                if (currentStockCode) {
                    refreshStockData();
                }
            }, 30000);
            
            console.log('自动刷新已启动，间隔30秒');
        }
        
        function stopAutoRefresh() {
            if (refreshInterval) {
                clearInterval(refreshInterval);
                refreshInterval = null;
                console.log('自动刷新已停止');
            }
        }
        
        function loadQueryHistory() {
            fetch('/api/query_history')
                .then(response => response.json())
                .then(data => {
                    displayQueryHistory(data.history);
                })
                .catch(error => {
                    console.error('获取历史记录失败:', error);
                });
        }
        
        function displayQueryHistory(history) {
            const historyList = document.getElementById('history-list');
            
            if (!history || history.length === 0) {
                historyList.innerHTML = '<div style="text-align: center; color: #999; padding: 20px;">暂无历史记录</div>';
                return;
            }
            
            historyList.innerHTML = history.map(item => `
                <div class="history-item" onclick="quickAnalyze('${item.code}')">
                    <div class="history-code">${item.code}</div>
                    <div class="history-time">${item.timestamp}</div>
                </div>
            `).join('');
        }
        
        function quickAnalyze(stockCode) {
            document.getElementById('stock-code').value = stockCode;
            analyzeStock();
        }
        
        function setLoading(loading) {
            const btn = document.getElementById('analyze-btn');
            const loadingSpinner = document.getElementById('analyze-loading');
            const btnText = document.getElementById('analyze-btn-text');
            
            if (loading) {
                btn.disabled = true;
                loadingSpinner.classList.remove('hidden');
                btnText.textContent = '分析中...';
            } else {
                btn.disabled = false;
                loadingSpinner.classList.add('hidden');
                btnText.textContent = '立即分析';
            }
        }
        
        function showStatus(message, type) {
            const statusElement = document.getElementById('status-message');
            statusElement.textContent = message;
            statusElement.className = 'status-message';
            statusElement.classList.add('status-' + type);
            statusElement.classList.remove('hidden');
            
            setTimeout(() => {
                statusElement.classList.add('hidden');
            }, 5000);
        }
        
        function updateLastUpdateTime() {
            const now = new Date();
            const timeString = now.toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
            document.getElementById('last-update-time').textContent = '最后更新: ' + timeString;
        }
        
        window.addEventListener('beforeunload', function() {
            stopAutoRefresh();
        });
    </script>
</body>
</html>
