services:
  - type: web
    name: stock-analysis
    env: python
    buildCommand: pip install -r requirements.txt gunicorn
    startCommand: gunicorn wsgi:app --bind 0.0.0.0:${PORT:-5001}
    envVars:
      - key: PORT
        value: 5001
      - key: SECRET_KEY
        generateValue: true
        sync: false
    plan: free